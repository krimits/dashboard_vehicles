services:
  - type: web
    name: fleet-dashboard
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -X utf8 "Qwen_python_20260317_kqvga2wu9.py" --storage-dir /var/data/dashboard
    healthCheckPath: /
    autoDeploy: false
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: HOST
        value: 0.0.0.0
      - key: DASHBOARD_ADMIN_SECRET
        sync: false
    disk:
      name: fleet-dashboard-data
      mountPath: /var/data
      sizeGB: 1
